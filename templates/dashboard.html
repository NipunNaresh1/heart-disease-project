<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .dashboard-container {
            padding: 20px;
        }
        .dashboard-header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        .chart-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .loading {
            text-align: center;
            padding: 20px;
        }
        .nav-tabs .nav-link {
            color: #764ba2;
            font-weight: 500;
        }
        .nav-tabs .nav-link.active {
            background-color: #764ba2;
            color: white;
            border-color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container-fluid dashboard-container">
        <!-- Header -->
        <div class="dashboard-header text-center">
            <h1 class="display-4 mb-3">
                <i class="fas fa-heartbeat text-danger"></i> 
                Heart Disease Analytics Dashboard
            </h1>
            <p class="lead">Comprehensive Analysis of Heart Disease Risk Factors</p>
            <div class="row mt-4">
                <div class="col-md-3">
                    <div class="stat-card text-center">
                        <div class="stat-icon text-primary">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-value" id="total-patients">-</div>
                        <div class="stat-label">Total Patients</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card text-center">
                        <div class="stat-icon text-success">
                            <i class="fas fa-birthday-cake"></i>
                        </div>
                        <div class="stat-value" id="avg-age">-</div>
                        <div class="stat-label">Average Age</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card text-center">
                        <div class="stat-icon text-warning">
                            <i class="fas fa-tint"></i>
                        </div>
                        <div class="stat-value" id="avg-cholesterol">-</div>
                        <div class="stat-label">Avg Cholesterol</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card text-center">
                        <div class="stat-icon text-danger">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <div class="stat-value" id="heart-disease-percentage">-</div>
                        <div class="stat-label">Heart Disease %</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="row">
            <div class="col-md-6">
                <div class="chart-container">
                    <h5 class="mb-3"><i class="fas fa-venus-mars"></i> Gender Distribution</h5>
                    <canvas id="genderChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-container">
                    <h5 class="mb-3"><i class="fas fa-hourglass-half"></i> Age Distribution</h5>
                    <canvas id="ageChart"></canvas>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="chart-container">
                    <h5 class="mb-3"><i class="fas fa-lungs"></i> Chest Pain Analysis</h5>
                    <canvas id="chestPainChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-container">
                    <h5 class="mb-3"><i class="fas fa-tint"></i> Cholesterol Levels</h5>
                    <canvas id="cholesterolChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-4">
            <p class="text-white">
                <i class="fas fa-code"></i> Heart Disease Analytics Dashboard v1.0.0
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            loadOverviewStats();
            loadGenderDistribution();
            loadAgeDistribution();
            loadChestPainAnalysis();
            loadCholesterolAnalysis();
        });

        // Load overview statistics
        async function loadOverviewStats() {
            try {
                const response = await fetch('/api/overview');
                const data = await response.json();
                
                document.getElementById('total-patients').textContent = data.total_patients.count;
                document.getElementById('avg-age').textContent = data.avg_age.avg_age + ' years';
                document.getElementById('avg-cholesterol').textContent = data.avg_cholesterol.avg_chol + ' mg/dl';
                document.getElementById('heart-disease-percentage').textContent = data.heart_disease_percentage.percentage + '%';
            } catch (error) {
                console.error('Error loading overview stats:', error);
            }
        }

        // Load gender distribution
        async function loadGenderDistribution() {
            try {
                const response = await fetch('/api/gender_distribution');
                const data = await response.json();
                
                const ctx = document.getElementById('genderChart').getContext('2d');
                new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: data.map(d => d.gender),
                        datasets: [{
                            data: data.map(d => d.count),
                            backgroundColor: ['#FF6384', '#36A2EB'],
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading gender distribution:', error);
            }
        }

        // Load age distribution
        async function loadAgeDistribution() {
            try {
                const response = await fetch('/api/age_distribution');
                const data = await response.json();
                
                const ctx = document.getElementById('ageChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.age_group),
                        datasets: [{
                            label: 'Total Patients',
                            data: data.map(d => d.count),
                            backgroundColor: '#36A2EB',
                            borderColor: '#36A2EB',
                            borderWidth: 1
                        }, {
                            label: 'Heart Disease Cases',
                            data: data.map(d => d.heart_disease_cases),
                            backgroundColor: '#FF6384',
                            borderColor: '#FF6384',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading age distribution:', error);
            }
        }

        // Load chest pain analysis
        async function loadChestPainAnalysis() {
            try {
                const response = await fetch('/api/chest_pain_analysis');
                const data = await response.json();
                
                const ctx = document.getElementById('chestPainChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: data.map(d => d.chest_pain_type),
                        datasets: [{
                            data: data.map(d => d.count),
                            backgroundColor: [
                                '#FF6384',
                                '#36A2EB',
                                '#FFCE56',
                                '#4BC0C0'
                            ],
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading chest pain analysis:', error);
            }
        }

        // Load cholesterol analysis
        async function loadCholesterolAnalysis() {
            try {
                const response = await fetch('/api/cholesterol_analysis');
                const data = await response.json();
                
                const ctx = document.getElementById('cholesterolChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.cholesterol_level),
                        datasets: [{
                            label: 'Total Patients',
                            data: data.map(d => d.count),
                            backgroundColor: '#FFCE56',
                            borderColor: '#FFCE56',
                            borderWidth: 1
                        }, {
                            label: 'Heart Disease Cases',
                            data: data.map(d => d.heart_disease_cases),
                            backgroundColor: '#FF6384',
                            borderColor: '#FF6384',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading cholesterol analysis:', error);
            }
        }
    </script>
</body>
</html>
